server:
  port: 8080

spring:
  application:
    name: ops-digital-staff
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ops_digital_staff?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ""
  redis:
    host: localhost
    port: 6379
    database: 0

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# Knife4j配置
knife4j:
  enable: true
  setting:
    language: zh_cn

# AnythingLLM配置
anything-llm:
  base-url: http://localhost:3001/api
  api-key: your-api-key-here
  default-query-workspace: default
