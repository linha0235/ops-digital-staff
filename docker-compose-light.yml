services:
  mysql:
    image: mysql:8.0.31
    container_name: ops-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "1234"
      MYSQL_DATABASE: ops_digital_staff
      TZ: Asia/Shanghai
    volumes:
      - ./backend/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p1234"]
      interval: 5s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2
    container_name: ops-redis
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 5s
      retries: 5
